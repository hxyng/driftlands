name: CI

# Runs the headless GDScript test suite for the RPG core on every push/PR.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Headless tests
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4
      - name: Import resources
        run: godot --headless --import || true
      - name: Run test suite
        run: godot --headless --script res://tests/test_runner.gd
